<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SafeWalk · 내 주변 안전지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#f0f4fa; --white:#ffffff; --navy:#1a2540; --blue:#2563eb;
  --cyan:#0891b2; --green:#059669; --orange:#ea580c; --pink:#db2777;
  --gray:#64748b; --gray2:#e2e8f0; --card:rgba(255,255,255,0.92);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--navy);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#e8f0fe 0%,#f0f9ff 50%,#fef3c7 100%);transition:opacity .5s,transform .5s;}
#intro.out{opacity:0;transform:scale(1.05);pointer-events:none;}
.intro-content{display:flex;flex-direction:column;align-items:center;padding:0 28px;width:100%;max-width:420px;animation:fadeup .7s ease both;}
@keyframes fadeup{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);border-radius:100px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.08em;margin-bottom:28px;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.app-name{font-size:48px;font-weight:900;letter-spacing:-.03em;color:var(--navy);margin-bottom:6px;}
.app-name span{color:var(--blue);}
.app-sub{font-size:14px;color:var(--gray);margin-bottom:44px;}
.section-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--gray);text-transform:uppercase;margin-bottom:14px;align-self:flex-start;}
.age-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:24px;}
.age-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 8px;border-radius:18px;border:2px solid var(--gray2);background:var(--white);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.age-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);}
.age-card.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.age-card.selected[data-group="child"]{border-color:var(--green);}
.age-card.selected[data-group="youth"]{border-color:var(--pink);}
.age-card.selected[data-group="elder"]{border-color:var(--orange);}
.age-icon{font-size:30px;}
.age-name{font-size:13px;font-weight:700;color:var(--navy);}
.age-desc{font-size:10px;color:var(--gray);text-align:center;line-height:1.4;}
.start-btn{width:100%;padding:16px;border-radius:14px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;opacity:.35;pointer-events:none;font-family:'Noto Sans KR',sans-serif;}
.start-btn.on{opacity:1;pointer-events:auto;}
.start-btn.on:hover{background:#1d4ed8;transform:translateY(-1px);}

/* MAP SCREEN */
#map-screen{position:fixed;inset:0;display:none;flex-direction:column;}
#map-screen.show{display:flex;}
#map{flex:1;width:100%;}

/* TOPBAR */
.topbar{position:absolute;top:0;left:0;right:0;z-index:500;padding:12px 14px 0;display:flex;gap:8px;align-items:center;pointer-events:none;}
.icon-btn{pointer-events:auto;width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--gray2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.1);transition:background .2s;}
.icon-btn:hover{background:#dbeafe;}
.topbar-info{pointer-events:auto;flex:1;background:var(--card);border:1px solid var(--gray2);border-radius:13px;padding:8px 13px;backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;gap:8px;}
.group-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;}
.group-tag.child{background:#d1fae5;color:#065f46;}
.group-tag.youth{background:#fce7f3;color:#9d174d;}
.group-tag.elder{background:#ffedd5;color:#9a3412;}
.topbar-loc{font-size:12px;color:var(--gray);}

/* LAYER PANEL */
.layer-panel{position:absolute;bottom:0;left:0;right:0;z-index:500;padding:0 14px 18px;pointer-events:none;}
.chips{pointer-events:auto;display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:9px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:100px;background:var(--card);border:1.5px solid var(--gray2);backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s;white-space:nowrap;opacity:.55;}
.chip.on{opacity:1;color:var(--navy);}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stats-bar{pointer-events:auto;background:var(--card);border:1px solid var(--gray2);border-radius:16px;padding:12px 16px;backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:space-between;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.stat-num{font-size:20px;font-weight:900;}
.stat-lbl{font-size:10px;color:var(--gray);font-weight:500;}
.stat-div{width:1px;height:30px;background:var(--gray2);}

/* POPUP */
.safepopup .leaflet-popup-content-wrapper{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);color:var(--navy);}
.safepopup .leaflet-popup-content{margin:12px 15px;}
.safepopup .leaflet-popup-tip{background:#fff;}
.safepopup .leaflet-popup-close-button{color:var(--gray);}
.ptitle{font-size:14px;font-weight:700;margin-bottom:5px;}
.prow{font-size:12px;color:var(--gray);margin-top:3px;display:flex;align-items:center;gap:5px;}
.pbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-bottom:7px;}

/* LOADING */
#loading{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s;}
#loading.hide{opacity:0;pointer-events:none;}
.spin{width:44px;height:44px;border:3px solid var(--gray2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;color:var(--gray);font-weight:500;}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="load-txt" id="loadTxt">불러오는 중...</div>
</div>

<div id="intro">
  <div class="intro-content">
    <div class="badge"><span class="badge-dot"></span>생활안전지도 기반</div>
    <div style="font-size:10px;color:var(--gray);margin-top:-20px;margin-bottom:28px;letter-spacing:.05em;">v.1.1.1</div>
    <div class="app-name">Safe<span>Walk</span></div>
    <div class="app-sub">내 주변 안전 인프라, 미리 확인하세요</div>
    <div class="section-lbl">나는 누구인가요?</div>
    <div class="age-cards">
      <div class="age-card" data-group="child" onclick="pick(this)">
        <div class="age-icon">🧒</div>
        <div class="age-name">아동</div>
        <div class="age-desc">초등학생<br>이하</div>
      </div>
      <div class="age-card" data-group="youth" onclick="pick(this)">
        <div class="age-icon">🚶‍♀️</div>
        <div class="age-name">청소년</div>
        <div class="age-desc">중·고등<br>학생</div>
      </div>
      <div class="age-card" data-group="elder" onclick="pick(this)">
        <div class="age-icon">👴</div>
        <div class="age-name">노인</div>
        <div class="age-desc">65세<br>이상</div>
      </div>
    </div>
    <button class="start-btn" id="startBtn" onclick="start()">📍 내 주변 안전지도 보기</button>
  </div>
</div>

<div id="map-screen">
  <div id="map"></div>
  <div class="topbar">
    <div class="icon-btn" onclick="goBack()">←</div>
    <div class="topbar-info">
      <span class="group-tag" id="gTag"></span>
      <span class="topbar-loc" id="locTxt">위치 확인 중...</span>
    </div>
    <div class="icon-btn" onclick="flyHome()">📍</div>
  </div>
  <div class="layer-panel">
    <div class="chips" id="chips"></div>
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-num" id="s1" style="color:#0891b2">-</div><div class="stat-lbl">비상벨</div></div>
      <div class="stat-div"></div>
      <div class="stat-item"><div class="stat-num" id="s2" style="color:#7c3aed">-</div><div class="stat-lbl">치안시설</div></div>
      <div class="stat-div"></div>
      <div class="stat-item"><div class="stat-num" id="s3" style="color:#059669">-</div><div class="stat-lbl">특화시설</div></div>
      <div class="stat-div"></div>
      <div class="stat-item"><div class="stat-num" style="color:#ea580c">1km</div><div class="stat-lbl">반경</div></div>
    </div>
  </div>
</div>

<script>
/* ── 설정 ── */
const API_KEY = 'EYQ7ZKD8-EYQ7-EYQ7-EYQ7-EYQ7ZKD8HA';
const R_KM = 1.0;

// XML API (좌표 필드명은 API 확인 후 업데이트 필요)
const XML_API = {
  bell:       'https://safemap.go.kr/openapi2/IF_0032',
  police:     'https://safemap.go.kr/openapi2/IF_0036',
  child_house:'https://safemap.go.kr/openapi2/IF_0055',
  cpted:      'https://safemap.go.kr/openapi2/IF_0023',
};

// WMS API
const WMS_API = {
  women:    'https://safemap.go.kr/openapi2/IF_0080_WMS',
  elder_c:  'https://safemap.go.kr/openapi2/IF_0082_WMS',
  children: 'https://safemap.go.kr/openapi2/IF_0081_WMS',
  cctv:     'https://safemap.go.kr/openapi2/IF_0131_WMS',
};

const LAYER = {
  bell:       {label:'안전비상벨',        color:'#0891b2', emoji:'🔔'},
  police:     {label:'치안시설',          color:'#7c3aed', emoji:'🚔'},
  child_house:{label:'아동안전지킴이집',   color:'#059669', emoji:'🏠'},
  cpted:      {label:'범죄예방환경설계',   color:'#b45309', emoji:'🏗'},
};
const WMS_LAYER = {
  women:    {label:'여성밤길안전',   color:'#db2777'},
  elder_c:  {label:'노인범죄주의',   color:'#ea580c'},
  children: {label:'어린이범죄주의', color:'#ca8a04'},
  cctv:     {label:'CCTV',          color:'#2563eb'},
};
const GROUP = {
  child: {label:'아동',  color:'#059669', emoji:'🧒',  xml:['bell','police','child_house'], wms:['children','cctv'], special:'child_house'},
  youth: {label:'청소년',color:'#db2777', emoji:'🚶‍♀️', xml:['bell','police'],              wms:['women','cctv'],    special:null},
  elder: {label:'노인',  color:'#ea580c', emoji:'👴',  xml:['bell','police'],              wms:['elder_c','cctv'],  special:null},
};

/* ── 상태 ── */
let map, myMark, myLat, myLng, grp=null;
let layers={}, wmsTiles={}, chipOn={}, counts={};

/* ── 인트로 ── */
function pick(el){
  document.querySelectorAll('.age-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  grp=el.dataset.group;
  document.getElementById('startBtn').classList.add('on');
}

function start(){
  document.getElementById('intro').classList.add('out');
  document.getElementById('map-screen').classList.add('show');
  document.getElementById('loading').classList.remove('hide');
  initMap();
}

function goBack(){
  document.getElementById('intro').classList.remove('out');
  document.getElementById('map-screen').classList.remove('show');
  if(map){map.remove();map=null;}
  layers={};wmsTiles={};chipOn={};counts={};
}

/* ── 지도 ── */
function initMap(){
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView([36.5,127.8],7);
  // 밝은 지도 타일
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {maxZoom:19,subdomains:'abcd'}).addTo(map);
  buildChips();
  getGPS();
}

function buildChips(){
  const g=GROUP[grp], c=document.getElementById('chips');
  c.innerHTML='';
  g.xml.forEach(key=>{
    const m=LAYER[key]; chipOn[key]=true;
    const el=document.createElement('div');
    el.className='chip on'; el.id='c_'+key;
    el.innerHTML=`<span class="chip-dot" style="background:${m.color}"></span>${m.emoji} ${m.label}`;
    el.onclick=()=>toggleXML(key);
    c.appendChild(el);
  });
  g.wms.forEach(key=>{
    const m=WMS_LAYER[key]; chipOn['w_'+key]=true;
    const el=document.createElement('div');
    el.className='chip on'; el.id='c_w_'+key;
    el.innerHTML=`<span class="chip-dot" style="background:${m.color}"></span>🗺 ${m.label}`;
    el.onclick=()=>toggleWMS(key);
    c.appendChild(el);
  });
  const t=document.getElementById('gTag'), g2=GROUP[grp];
  t.textContent=g2.emoji+' '+g2.label;
  t.className='group-tag '+grp;
}

function toggleXML(key){
  chipOn[key]=!chipOn[key];
  document.getElementById('c_'+key).classList.toggle('on',chipOn[key]);
  if(layers[key]) chipOn[key]?map.addLayer(layers[key]):map.removeLayer(layers[key]);
}
function toggleWMS(key){
  chipOn['w_'+key]=!chipOn['w_'+key];
  document.getElementById('c_w_'+key).classList.toggle('on',chipOn['w_'+key]);
  if(wmsTiles[key]) chipOn['w_'+key]?map.addLayer(wmsTiles[key]):map.removeLayer(wmsTiles[key]);
}

/* ── GPS ── */
function getGPS(){
  if(!navigator.geolocation){useDefault();return;}
  navigator.geolocation.getCurrentPosition(
    p=>{myLat=p.coords.latitude;myLng=p.coords.longitude;onLocated();},
    ()=>useDefault(),{timeout:7000,enableHighAccuracy:true}
  );
}
function useDefault(){myLat=36.0190;myLng=129.3435;onLocated();}

function onLocated(){
  map.setView([myLat,myLng],15);
  drawMe();
  revGeo();
  addWMS();
  fetchAll();
}

function drawMe(){
  if(myMark)map.removeLayer(myMark);
  const g=GROUP[grp];
  const icon=L.divIcon({
    html:`<div style="width:42px;height:42px;border-radius:50%;background:${g.color};border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 3px 12px rgba(0,0,0,.25);">${g.emoji}</div>`,
    className:'',iconSize:[42,42],iconAnchor:[21,21]
  });
  myMark=L.marker([myLat,myLng],{icon,zIndexOffset:1000}).addTo(map);
  myMark.bindPopup(`<div class="ptitle">📍 현재 내 위치</div><div class="prow">반경 ${R_KM}km 내 안전시설을 표시합니다</div>`);
}
function flyHome(){if(myLat)map.flyTo([myLat,myLng],15,{duration:1});}

function revGeo(){
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${myLat}&lon=${myLng}&format=json&accept-language=ko`)
    .then(r=>r.json()).then(d=>{
      const a=d.address;
      document.getElementById('locTxt').textContent=a.city_district||a.suburb||a.neighbourhood||a.county||'위치 확인됨';
    }).catch(()=>{document.getElementById('locTxt').textContent='위치 확인됨';});
}

/* ── WMS (safemap 커스텀 방식) ── */
// EPSG:4326용 (여성밤길, 노인, 어린이) - layers 파라미터 없음
const SafemapWMS4326 = L.TileLayer.extend({
  getTileUrl: function(coords){
    const b = this._tileCoordsToBounds(coords);
    const bbox = [b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(',');
    return this._url
      + '?serviceKey=' + API_KEY
      + '&srs=EPSG:4326'
      + '&bbox=' + bbox
      + '&format=image/png&width=256&height=256&transparent=TRUE';
  }
});

// CCTV: bbox는 4326 좌표, srs=EPSG:3857, layers 파라미터 포함
const SafemapWMS3857 = L.TileLayer.extend({
  getTileUrl: function(coords){
    const b = this._tileCoordsToBounds(coords);
    const bbox = [b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(',');
    return this._url
      + '?serviceKey=' + API_KEY
      + '&layers=A2SM_CCTV_INFO'
      + '&styles='
      + '&srs=EPSG:3857'
      + '&bbox=' + bbox
      + '&format=image/png&width=256&height=256&transparent=TRUE';
  }
});

function addWMS(){
  GROUP[grp].wms.forEach(key=>{
    try{
      const url = WMS_API[key];
      if(!url){console.warn('WMS URL 없음:',key);return;}
      let t;
      // 모든 WMS 동일 방식 (CCTV 포함): srs=EPSG:4326, layers 없음
      t = new SafemapWMS4326(url, {opacity:0.5, tileSize:256});
      t.addTo(map); wmsTiles[key]=t;
    }catch(e){console.warn('WMS 오류',key,e);}
  });
}

/* ── XML 데이터 ── */
async function fetchAll(){
  document.getElementById('loadTxt').textContent='안전시설 데이터 불러오는 중...';
  await Promise.allSettled(GROUP[grp].xml.map(k=>fetchLayer(k)));
  document.getElementById('loading').classList.add('hide');
  updateStats();
}

async function fetchLayer(key){
  const cfg=LAYER_API[key];
  if(!cfg){console.warn('['+key+'] LAYER_API 없음');return;}
  const bounds=map.getBounds();
  // area4326: top,bottom,left,right
  const area4326=[
    bounds.getNorth(),bounds.getSouth(),
    bounds.getWest(),bounds.getEast()
  ].join(',');
  // area3857: top,bottom,left,right (EPSG:3857 미터 좌표)
  const nw=L.CRS.EPSG3857.project(bounds.getNorthWest());
  const se=L.CRS.EPSG3857.project(bounds.getSouthEast());
  const area3857=[nw.y,se.y,nw.x,se.x].join(',');

  const params=new URLSearchParams({
    layerName:cfg.layer, style:cfg.style,
    area4326, area3857,
    currentPage:'1', perPage:'500'
  });
  try{
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),10000);
    const res=await fetch(MARKER_API,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:params, signal:ctrl.signal
    });
    const data=await res.json();
    const items=data.resultList||[];
    if(items.length===0)throw new Error('no items');
    if(layers[key])map.removeLayer(layers[key]);
    const lg=L.layerGroup(); let cnt=0;
    items.forEach(it=>{
      const lat=parseFloat(it.lat||0);
      const lng=parseFloat(it.lon||0);
      if(!lat||!lng||isNaN(lat)||isNaN(lng))return;
      if(!near(lat,lng))return;
      mkMarker(key,lat,lng,it).addTo(lg); cnt++;
    });
    lg.addTo(map); layers[key]=lg; counts[key]=cnt;
    if(!chipOn[key])map.removeLayer(lg);
    updateStats();
    console.log('['+key+'] 로드완료:'+cnt+'개');
  }catch(e){
    console.warn('['+key+'] 실패:',e.message);
  }
}

function xv(it,tag){return it&&it[tag]!=null?String(it[tag]).trim():'';}

function near(lat,lng){
  const R=6371,dl=(myLat-lat)*Math.PI/180,dg=(myLng-lng)*Math.PI/180;
  const a=Math.sin(dl/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(myLat*Math.PI/180)*Math.sin(dg/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))<=R_KM;
}

/* ── 마커 ── */
function mkMarker(key,lat,lng,it){
  const m=LAYER[key];
  let name='',addr='',extra='';
  if(key==='bell'){
    // 안전비상벨 필드: ins_detail(설치위치), rn_adres(도로명), flag_pol_l(경찰연계)
    name=xv(it,'ins_detail')||xv(it,'rn_adres')||'안전비상벨';
    addr=xv(it,'rn_adres')||xv(it,'adres')||'';
    const pc=xv(it,'flag_pol_l')||'';
    extra=pc==='Y'?'<span style="color:#059669">✓ 경찰 연계</span>':'<span style="color:#dc2626">✗ 경찰 미연계</span>';
    const tel=xv(it,'mng_tel')||'';
    if(tel)extra+=`<br><span style="color:#64748b">📞 ${tel}</span>`;
  }else if(key==='police'){
    // 치안시설 필드: fclty_nm(시설명), rn_adres(도로명), fclty_ty(유형)
    name=xv(it,'fclty_nm')||'치안시설';
    addr=xv(it,'rn_adres')||xv(it,'adres')||'';
    const tp=xv(it,'fclty_ty')||'';
    const tel=xv(it,'telno')||'';
    extra=(tp?`<span style="color:#7c3aed">${tp}</span> `:'')+
          (tel?`<span style="color:#64748b">📞 ${tel}</span>`:'');
  }else if(key==='child_house'){
    name=xv(it,'fclty_nm')||'아동안전지킴이집';
    addr=xv(it,'rn_adres')||xv(it,'adres')||'';
    const tel=xv(it,'telno')||'';
    extra='<span style="color:#059669">🏠 아동 보호</span>'+(tel?` <span style="color:#64748b">📞 ${tel}</span>`:'');
  }else if(key==='cpted'){
    // CPTED 필드: roadnm_add(도로명), dsign_prps(디자인종류), jp_nm(지구대명)
    name=xv(it,'roadnm_add')||xv(it,'jibun_addr')||'범죄예방환경설계';
    addr=xv(it,'roadnm_add')||'';
    const tp=xv(it,'dsign_prps')||'';
    const jp=xv(it,'jp_nm')||'';
    extra=(tp?`<span style="color:#b45309">${tp}</span> `:'')+
          (jp?`<span style="color:#64748b">📍 ${jp}</span>`:'');
  }
  const icon=L.divIcon({
    html:`<div style="width:36px;height:36px;border-radius:50%;background:#fff;border:2.5px solid ${m.color};display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,.18);">${m.emoji}</div>`,
    className:'',iconSize:[36,36],iconAnchor:[18,18]
  });
  return L.marker([lat,lng],{icon}).bindPopup(
    L.popup({className:'safepopup',closeButton:true,maxWidth:240}).setContent(`
      <div class="pbadge" style="background:${m.color}18;color:${m.color}">${m.emoji} ${m.label}</div>
      <div class="ptitle">${name}</div>
      ${addr?`<div class="prow">📍 ${addr}</div>`:''}
      ${extra?`<div class="prow">${extra}</div>`:''}
    `)
  );
}

/* ── 통계 ── */
function updateStats(){
  document.getElementById('s1').textContent=counts['bell']||0;
  document.getElementById('s2').textContent=counts['police']||0;
  document.getElementById('s3').textContent=GROUP[grp].special?(counts[GROUP[grp].special]||0):'-';
}

window.onload=()=>{
  if(typeof L==='undefined'){
    document.getElementById('loadTxt').textContent='지도 라이브러리 로드 실패. 인터넷 연결 확인 후 새로고침하세요.';
    return;
  }
  document.getElementById('loading').classList.add('hide');
};
</script>
