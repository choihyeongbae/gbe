<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>포항시 안전비상벨 찾기</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E53935;
    --red-dark: #B71C1C;
    --red-light: #FFCDD2;
    --bg: #1a1a2e;
    --card: #16213e;
    --card-light: #1f3050;
    --text: #e8e8e8;
    --text-dim: #8892a4;
    --accent: #FF6B6B;
    --safe: #4CAF50;
    --warn: #FFC107;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(229,57,53,0.3);
    position: relative;
    z-index: 1000;
  }
  .header .bell-icon {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    animation: bellRing 2s ease-in-out infinite;
  }
  @keyframes bellRing {
    0%,100% { transform: rotate(0deg); }
    10% { transform: rotate(14deg); }
    20% { transform: rotate(-14deg); }
    30% { transform: rotate(8deg); }
    40% { transform: rotate(-4deg); }
    50% { transform: rotate(0deg); }
  }
  .header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .header .sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .header .badge {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  /* Map */
  #map {
    width: 100%;
    height: 45vh;
    height: 45dvh;
  }

  /* GPS Button */
  .gps-section {
    padding: 16px 20px;
    display: flex;
    gap: 10px;
  }
  .btn-gps {
    flex: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--red) 100%);
    border: none;
    color: #fff;
    padding: 14px 20px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(255,107,107,0.3);
  }
  .btn-gps:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,107,107,0.4); }
  .btn-gps:active { transform: translateY(0); }
  .btn-gps:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-gps .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-list {
    width: 48px; height: 48px;
    background: var(--card-light);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    border-radius: 14px;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn-list:hover { background: rgba(255,255,255,0.1); }

  /* Result Card */
  .result-card {
    margin: 0 20px 16px;
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    display: none;
  }
  .result-card.show { display: block; animation: slideUp 0.4s ease; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-header {
    background: linear-gradient(135deg, var(--card-light) 0%, var(--card) 100%);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .distance-badge {
    min-width: 72px;
    text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--red));
    padding: 8px 12px;
    border-radius: 12px;
  }
  .distance-badge .num { font-size: 22px; font-weight: 800; line-height: 1; }
  .distance-badge .unit { font-size: 10px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .result-name { font-size: 16px; font-weight: 700; }
  .result-addr { font-size: 12px; color: var(--text-dim); margin-top: 4px; line-height: 1.4; }

  .result-body { padding: 14px 18px; }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .info-item {
    background: rgba(255,255,255,0.04);
    padding: 10px 12px;
    border-radius: 10px;
  }
  .info-item .label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .info-item .value { font-size: 13px; font-weight: 600; }
  .info-item .value.yes { color: var(--safe); }
  .info-item .value.no { color: var(--warn); }

  .result-footer {
    padding: 0 18px 16px;
    display: flex;
    gap: 8px;
  }
  .btn-navi {
    flex: 1;
    background: var(--safe);
    border: none;
    color: #fff;
    padding: 12px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-call {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 12px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  /* Stats Bar */
  .stats-bar {
    margin: 0 20px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat-item {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-item .stat-num { font-size: 22px; font-weight: 800; color: var(--accent); }
  .stat-item .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  /* List Panel */
  .list-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    max-height: 70vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 2000;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  }
  .list-panel.open { transform: translateY(0); }
  .list-handle {
    text-align: center;
    padding: 12px;
    cursor: pointer;
  }
  .list-handle::before {
    content: '';
    display: inline-block;
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
  }
  .list-title { padding: 0 20px 12px; font-size: 16px; font-weight: 700; }
  .list-item {
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .list-item:hover { background: rgba(255,255,255,0.04); }
  .list-item .li-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .li-icon.police { background: rgba(76,175,80,0.15); }
  .li-icon.no-police { background: rgba(255,193,7,0.15); }
  .list-item .li-name { font-size: 14px; font-weight: 600; }
  .list-item .li-addr { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .list-item .li-dist { margin-left: auto; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  /* Custom Leaflet */
  .bell-marker {
    background: none;
    border: none;
  }
  .marker-pin {
    width: 30px; height: 30px;
    background: var(--red);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    border: 2px solid #fff;
  }
  .marker-pin span {
    transform: rotate(45deg);
    font-size: 13px;
  }
  .marker-pin.nearest {
    background: var(--safe);
    width: 36px; height: 36px;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,0.5); }
    50% { box-shadow: 0 0 0 12px rgba(76,175,80,0); }
  }

  .user-marker {
    width: 18px; height: 18px;
    background: #4285F4;
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 6px rgba(66,133,244,0.25), 0 2px 8px rgba(0,0,0,0.3);
  }

  .leaflet-popup-content-wrapper {
    background: var(--card) !important;
    color: var(--text) !important;
    border-radius: 12px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
  }
  .leaflet-popup-tip { background: var(--card) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; font-family: 'Noto Sans KR', sans-serif !important; }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 13px;
    z-index: 3000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

  </div>
  <div class="result-footer">

    <button class="btn-call" id="btnCall" onclick="callMgmt()">📞 관리기관 연락</button>

</div>

<div class="overlay" id="overlay" onclick="toggleList()"></div>
<div class="list-panel" id="listPanel">

let map, markers = [], userMarker = null, nearestBell = null, userLat = null, userLng = null;
let nearestMarkerRef = null;

// Haversine distance (meters)
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function createBellIcon(isNearest) {
  return L.divIcon({
    className: 'bell-marker',
    html: `<div class="marker-pin ${isNearest ? 'nearest' : ''}"><span>🔔</span></div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 30],
    popupAnchor: [0, -32]
  });
}

function createUserIcon() {
  return L.divIcon({
    className: 'bell-marker',
    html: '<div class="user-marker"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });
}

function initMap() {
  map = L.map('map', { zoomControl: false }).setView([36.04, 129.38], 11);
  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 19
  }).addTo(map);

  BELLS.forEach((b, i) => {
    const m = L.marker([b.lat, b.lng], { icon: createBellIcon(false) }).addTo(map);
    const popupHtml = `
      <div style="min-width:180px">
        <div style="font-weight:700;font-size:14px;margin-bottom:6px">${b.location}</div>
        <div style="font-size:11px;color:#8892a4;margin-bottom:8px;line-height:1.4">${b.address}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span style="background:${b.purpose==='약자보호'?'rgba(255,107,107,0.2)':'rgba(66,133,244,0.2)'};padding:2px 8px;border-radius:6px;font-size:11px">${b.purpose}</span>
          <span style="background:${b.policeLinked==='Y'?'rgba(76,175,80,0.2)':'rgba(255,193,7,0.2)'};padding:2px 8px;border-radius:6px;font-size:11px">경찰${b.policeLinked==='Y'?'✓':'✗'}</span>
        </div>
      </div>`;
    m.bindPopup(popupHtml);
    markers.push({ marker: m, bell: b });
  });

  buildList();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function findNearest() {
  const btn = document.getElementById('btnGps');
  if (!navigator.geolocation) {
    showToast('이 브라우저에서는 GPS를 지원하지 않습니다');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 위치 확인 중...';

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;

      // Reset previous nearest
      if (nearestMarkerRef) {
        nearestMarkerRef.setIcon(createBellIcon(false));
      }

      // User marker
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([userLat, userLng], { icon: createUserIcon(), zIndexOffset: 1000 }).addTo(map);

      // Find nearest
      let minDist = Infinity, minIdx = -1;
      BELLS.forEach((b, i) => {
        const d = haversine(userLat, userLng, b.lat, b.lng);
        if (d < minDist) { minDist = d; minIdx = i; }
      });

      nearestBell = BELLS[minIdx];
      nearestMarkerRef = markers[minIdx].marker;
      nearestMarkerRef.setIcon(createBellIcon(true));

      // Show result
      const distStr = minDist >= 1000 ? (minDist / 1000).toFixed(1) : Math.round(minDist);
      const unitStr = minDist >= 1000 ? 'km' : 'm';

      document.getElementById('resDist').textContent = distStr;
      document.getElementById('resUnit').textContent = unitStr;
      document.getElementById('resName').textContent = nearestBell.location;
      document.getElementById('resAddr').textContent = nearestBell.address;
      document.getElementById('resPurpose').textContent = nearestBell.purpose;
      const policeEl = document.getElementById('resPolice');
      policeEl.textContent = nearestBell.policeLinked === 'Y' ? '연계됨 ✓' : '미연계';
      policeEl.className = 'value ' + (nearestBell.policeLinked === 'Y' ? 'yes' : 'no');
      document.getElementById('resExtras').textContent = nearestBell.extras || '없음';
      document.getElementById('resCheck').textContent = nearestBell.lastCheck;

      document.getElementById('resultCard').classList.add('show');

      // Fit bounds
      const bounds = L.latLngBounds([
        [userLat, userLng],
        [nearestBell.lat, nearestBell.lng]
      ]);
      map.fitBounds(bounds, { padding: [60, 60], maxZoom: 15 });

      // Draw line
      if (window._line) map.removeLayer(window._line);
      window._line = L.polyline([[userLat, userLng], [nearestBell.lat, nearestBell.lng]], {
        color: '#FF6B6B', weight: 3, dashArray: '8 8', opacity: 0.7
      }).addTo(map);

      btn.disabled = false;
      btn.innerHTML = '<span>📍</span> 내 위치에서 가장 가까운 비상벨 찾기';
      showToast(`가장 가까운 비상벨: ${distStr}${unitStr}`);

      // Update list distances
      buildList();
    },
    err => {
      btn.disabled = false;
      btn.innerHTML = '<span>📍</span> 내 위치에서 가장 가까운 비상벨 찾기';
      let msg = '위치를 가져올 수 없습니다';
      if (err.code === 1) msg = '위치 접근이 거부되었습니다. 브라우저 설정을 확인해주세요.';
      showToast(msg);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function openNavi() {
  if (!nearestBell) return;
  const url = `https://map.kakao.com/link/to/${encodeURIComponent(nearestBell.location)},${nearestBell.lat},${nearestBell.lng}`;
  window.open(url, '_blank');
}

function callMgmt() {
  if (!nearestBell) return;
  const phone = nearestBell.mgmtPhone.replace(/[^0-9-]/g, '');
  if (phone) window.location.href = `tel:${phone}`;
}

function formatDist(d) {
  if (d === null) return '';
  return d >= 1000 ? (d / 1000).toFixed(1) + 'km' : Math.round(d) + 'm';
}

function buildList() {
  const sorted = BELLS.map((b, i) => {
    const dist = (userLat !== null) ? haversine(userLat, userLng, b.lat, b.lng) : null;
    return { ...b, dist, idx: i };
  });
  if (userLat !== null) sorted.sort((a, b) => a.dist - b.dist);

  const html = sorted.map(b => `
    <div class="list-item" onclick="focusBell(${b.idx})">
      <div class="li-icon ${b.policeLinked === 'Y' ? 'police' : 'no-police'}">🔔</div>
      <div>
        <div class="li-name">${b.location}</div>
        <div class="li-addr">${b.address.replace('경상북도 포항시 ', '')}</div>
      </div>
      ${b.dist !== null ? `<div class="li-dist">${formatDist(b.dist)}</div>` : ''}
    </div>
  `).join('');
  document.getElementById('listContent').innerHTML = html;
}

function focusBell(idx) {
  const b = BELLS[idx];
  map.setView([b.lat, b.lng], 16);
  markers[idx].marker.openPopup();
  toggleList();
}

function toggleList() {
  document.getElementById('listPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

initMap();
</script>
